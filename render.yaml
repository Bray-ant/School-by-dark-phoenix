services:
  - type: web
    name: forceform-learn
    runtime: node
    plan: starter
    buildCommand: npm install && npm run db:push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_OPEN_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false

  - type: cron
    name: forceform-reminders
    runtime: node
    schedule: "0 9 * * *"
    buildCommand: npm install
    startCommand: node scripts/send-reminders.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
